name: CI / Deploy

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint + Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Testes unitários
        run: yarn test --passWithNoTests --forceExit
        env:
          NODE_ENV: test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod +x /opt/inexci/deploy.sh
            cd /opt/inexci
            ./deploy.sh
