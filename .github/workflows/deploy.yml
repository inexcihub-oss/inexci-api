name: CI / Deploy

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint + Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Testes unitários
        run: yarn test --passWithNoTests --forceExit
        env:
          NODE_ENV: test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Diagnóstico SSH (DNS + porta)
        run: |
          echo "Host: ${{ secrets.VPS_HOST }}"
          getent hosts "${{ secrets.VPS_HOST }}" || true
          nc -zvw5 "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_PORT || 22 }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 2m
          command_timeout: 20m
          debug: true
          script: |
            set -euo pipefail

            COMPOSE="docker compose -f /opt/inexci/docker-compose.prod.yml"

            echo "==> Atualizando código..."
            cd /opt/inexci/inexci-api && git pull && cd /opt/inexci

            echo "==> Reconstruindo imagem da API..."
            $COMPOSE build api

            echo "==> Subindo redis, stt-service, api e dozzle..."
            $COMPOSE up -d redis stt-service api dozzle || true

            echo "==> Aguardando API ficar healthy..."
            HEALTHY=false
            for i in $(seq 1 36); do
              STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' inexci-api 2>/dev/null || echo "not-found")
              if [ "$STATUS" = "healthy" ]; then
                echo "==> API healthy!"
                HEALTHY=true
                break
              fi
              echo "    status atual: $STATUS ($i/36)"
              sleep 10
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "==> ERRO: API não ficou healthy em 6 minutos."
              echo "==> Últimos logs da API:"
              $COMPOSE logs api --tail 200
              echo "==> Inspeção do healthcheck do container:"
              docker inspect --format='{{json .State.Health}}' inexci-api || true
              exit 1
            fi

            echo "==> Subindo nginx..."
            $COMPOSE up -d nginx

            echo "==> Status final:"
            $COMPOSE ps
